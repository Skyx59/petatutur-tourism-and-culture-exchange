<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning History | Peta Tutur</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar-container">
            <div class="logo">Peta Tutur</div>
            <div class="nav-center">
                <a href="dashboard.html" class="nav-item">Home</a>
                <a href="catalog.html" class="nav-item">Cultural Catalog</a>
                
                <div class="nav-item dropdown active">
                    <span>Itinerary Workspace</span>
                    <span class="chevron"></span>
                    <div class="dropdown-menu">
                        <a href="workspace.html">Create New</a>
                        <a href="history.html">Planning History</a>
                    </div>
                </div>

                <a href="#" class="nav-item">Crowdsourcing</a>
                <a href="#" class="nav-item">Reputation</a>
            </div>
            <div class="nav-links">
                <a href="profile.html" class="nav-item">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </a>
            </div>
        </nav>
    </header>

    <main class="container">
        <section style="padding: 3rem 0;">
            <h1 style="font-size: 2.5rem; margin-bottom: 2rem;">Riwayat Perencanaan</h1>
            
            <div class="history-grid">
                <div class="feature-card" style="text-align: left; padding: 1.5rem;">
                    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem;">
                        <span style="font-size: 0.8rem; opacity: 0.6;">24 Mei 2026</span>
                        <span class="badge">Draft</span>
                    </div>
                    <h4>Eksplorasi Bandung Utara</h4>
                    <p style="font-size: 0.9rem; margin: 0.5rem 0;">Wilayah: Jawa Barat | Durasi: 6 Jam</p>
                    <button class="btn-auth" style="margin-top: 1rem; padding: 0.4rem 1rem; font-size: 0.8rem;">Lihat Detail</button>
                </div>

                <div class="feature-card" style="text-align: left; padding: 1.5rem;">
                    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem;">
                        <span style="font-size: 0.8rem; opacity: 0.6;">20 Mei 2026</span>
                        <span class="badge" style="background: var(--accent-green); color: white;">Completed</span>
                    </div>
                    <h4>Jejak Mataram Kuno</h4>
                    <p style="font-size: 0.9rem; margin: 0.5rem 0;">Wilayah: DI Yogyakarta | Durasi: 8 Jam</p>
                    <button class="btn-auth" style="margin-top: 1rem; padding: 0.4rem 1rem; font-size: 0.8rem;">Lihat Detail</button>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>

</html>
