<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cultural Catalog | Peta Tutur</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar-container">
            <div class="logo">Peta Tutur</div>
            <div class="nav-center">
                <a href="dashboard.html" class="nav-item">Home</a>
                <a href="catalog.html" class="nav-item">Cultural Catalog</a>
                
                <div class="nav-item dropdown">
                    <span>Itinerary Workspace</span>
                    <span class="chevron"></span>
                    <div class="dropdown-menu">
                        <a href="workspace.html">Create New</a>
                        <a href="history.html">Planning History</a>
                    </div>
                </div>

                <a href="#" class="nav-item">Crowdsourcing</a>
                <a href="#" class="nav-item">Reputation</a>
            </div>
            <div class="nav-links">
                <a href="profile.html" class="nav-item">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </a>
            </div>
        </nav>
    </header>

    <main class="container">
        <section style="padding: 3rem 0;">
            <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Katalog Budaya</h1>
            <p style="opacity: 0.8; margin-bottom: 3rem;">Jelajahi narasi tersembunyi dan warisan budaya dari berbagai penjuru nusantara.</p>

            <div id="catalog-grid" class="catalog-grid">
                <!-- Data fetched from API -->
            </div>
        </section>
    </main>

    <!-- Catalog Modal -->
    <div id="catalogModal" class="custom-modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalRegionTitle">Narasi Budaya</h2>
                <button class="close-modal" id="closeCatalog">&times;</button>
            </div>
            <div class="modal-body" id="narrativeList">
                <!-- Items populated by JS -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', fetchCatalog);

        async function fetchCatalog() {
            try {
                const response = await fetch('/api/catalog');
                const regions = await response.json();
                
                const grid = document.getElementById('catalog-grid');
                grid.innerHTML = '';
                
                regions.forEach(r => {
                    const card = document.createElement('div');
                    card.className = 'region-card';
                    card.innerHTML = `
                        <div class="card-media"></div>
                        <div class="card-content">
                            <h3>${r.region}</h3>
                            <p>${r.description}</p>
                            <span class="badge">${r.count} Narasi Tersembunyi</span>
                        </div>
                    `;
                    card.onclick = () => openNarratives(r.region);
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error(error);
            }
        }

        async function openNarratives(region) {
            const modal = document.getElementById('catalogModal');
            document.getElementById('modalRegionTitle').textContent = `Narasi di ${region}`;
            
            try {
                const response = await fetch(`/api/catalog/${region}/narratives`);
                const narratives = await response.json();
                
                const list = document.getElementById('narrativeList');
                list.innerHTML = '';
                
                narratives.forEach(n => {
                    const div = document.createElement('div');
                    div.className = 'narrative-item';
                    div.innerHTML = `
                        <h4>${n.name}</h4>
                        <p>${n.description}</p>
                        <span style="font-size: 0.8rem; color: var(--accent-green);">Kategori: ${n.category}</span>
                        <div style="margin-top: 1rem;">
                            <button class="btn-audio">Dengarkan Audio</button>
                        </div>
                    `;
                    list.appendChild(div);
                });
                
                modal.style.display = 'flex';
            } catch (error) {
                console.error(error);
            }
        }

        document.getElementById('closeCatalog').onclick = () => {
            document.getElementById('catalogModal').style.display = 'none';
        };
    </script>
</body>
</html>
