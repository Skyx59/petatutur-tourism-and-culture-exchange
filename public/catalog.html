<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Budaya | Peta Tutur</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar-container">
            <div class="logo">Peta Tutur</div>
            <div class="nav-center">
                <a href="dashboard.html" class="nav-item">Home</a>
                <a href="catalog.html" class="nav-item">Cultural Catalog</a>
                
                <div class="nav-item dropdown">
                    <span>Itinerary Workspace</span>
                    <span class="chevron"></span>
                    <div class="dropdown-menu">
                        <a href="workspace.html">Create New</a>
                        <a href="history.html">Planning History</a>
                    </div>
                </div>

                <a href="crowdsourcing.html" class="nav-item" data-feature="crowdsourcing">Crowdsourcing</a>
                <a href="reputation.html" class="nav-item" data-feature="reputation">Reputation</a>
            </div>
            <div class="nav-links">
                <a href="profile.html" class="nav-item">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </a>
            </div>
        </nav>
    </header>

    <main class="container">
        <section class="page-title">
            <span class="role-pill">Katalog</span>
            <h1>Katalog Budaya</h1>
            <p>Jelajahi narasi tersembunyi dan warisan budaya dari berbagai penjuru nusantara.</p>
        </section>

        <section class="feature-list catalog-section">
            <div class="section-heading">
                <span class="role-pill">Wilayah</span>
                <h2>Ruang Jelajah</h2>
            </div>
            <div id="catalog-grid" class="catalog-grid">
                <!-- Data fetched from API -->
            </div>
        </section>
    </main>

    <!-- Catalog Modal -->
    <div id="catalogModal" class="custom-modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalRegionTitle">Narasi Budaya</h2>
                <button class="close-modal" id="closeCatalog">&times;</button>
            </div>
            <div class="modal-body" id="narrativeList">
                <!-- Items populated by JS -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', fetchCatalog);

        async function fetchCatalog() {
            try {
                const response = await fetch('/api/catalog');
                const regions = await response.json();
                
                const grid = document.getElementById('catalog-grid');
                grid.innerHTML = '';
                
                regions.forEach(r => {
                    const card = document.createElement('article');
                    card.className = 'region-card';
                    card.tabIndex = 0;
                    card.setAttribute('role', 'button');
                    card.setAttribute('aria-label', `Lihat detail narasi budaya ${r.region}`);
                    card.innerHTML = `
                        <div class="card-media" aria-hidden="true">
                            <span>${escapeHtml(r.region)}</span>
                        </div>
                        <div class="card-content">
                            <div>
                                <span class="role-pill">Wilayah</span>
                                <h3>${escapeHtml(r.region)}</h3>
                                <p>${escapeHtml(r.description)}</p>
                                <div class="catalog-tag-row">
                                    ${(r.tags || []).slice(0, 4).map(tag => `<span class="mini-chip">${escapeHtml(tag)}</span>`).join('')}
                                </div>
                            </div>
                            <div class="region-card-footer">
                                <span class="badge">${r.count} Narasi Tersembunyi</span>
                                <span class="badge">${r.locationCount} Lokasi</span>
                                <button type="button" class="btn-detail region-detail-btn">Lihat Detail</button>
                            </div>
                        </div>
                    `;
                    card.addEventListener('click', () => openNarratives(r.region));
                    card.addEventListener('keydown', (event) => {
                        if (event.key === 'Enter' || event.key === ' ') {
                            event.preventDefault();
                            openNarratives(r.region);
                        }
                    });
                    card.querySelector('.region-detail-btn').addEventListener('click', (event) => {
                        event.stopPropagation();
                        openNarratives(r.region);
                    });
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error(error);
            }
        }

        async function openNarratives(region) {
            const modal = document.getElementById('catalogModal');
            document.getElementById('modalRegionTitle').textContent = `Narasi di ${region}`;
            
            try {
                const response = await fetch(`/api/catalog/${region}/narratives`);
                const narratives = await response.json();
                
                const list = document.getElementById('narrativeList');
                list.innerHTML = '';

                if (narratives.length === 0) {
                    list.innerHTML = '<div class="empty-state">Belum ada narasi budaya pada wilayah ini.</div>';
                    modal.style.display = 'flex';
                    return;
                }
                
                narratives.forEach(location => {
                    const div = document.createElement('div');
                    div.className = 'narrative-location-card';
                    div.innerHTML = `
                        <div class="feature-card-topline">
                            <span class="role-pill">${escapeHtml(location.category)}</span>
                            <span>${escapeHtml(location.city || region)}</span>
                        </div>
                        <h4>${escapeHtml(location.name)}</h4>
                        <p>${escapeHtml(location.description)}</p>
                        <div class="catalog-tag-row">
                            ${(location.tags || []).slice(0, 5).map(tag => `<span class="mini-chip">${escapeHtml(tag)}</span>`).join('')}
                        </div>
                        <div class="narrative-asset-grid">
                            ${(location.narratives || []).map(item => renderNarrativeAsset(item)).join('')}
                        </div>
                    `;
                    list.appendChild(div);
                });
                
                modal.style.display = 'flex';
            } catch (error) {
                console.error(error);
            }
        }

        function renderNarrativeAsset(item) {
            const isAudio = item.mediaType === 'audio' || item.narrativeType === 'Audio';
            const action = isAudio
                ? `<button class="btn-audio" type="button" data-catalog-audio="${escapeHtml(item.mediaPath || '')}">Dengarkan Audio</button>
                   <p class="catalog-audio-status">Audio placeholder siap. Tambahkan media_path untuk memutar audio asli.</p>`
                : `<button class="btn-read" type="button" data-read-highlight>Baca Narasi</button>`;

            return `
                <article class="narrative-asset-card">
                    <div class="feature-card-topline">
                        <span class="role-pill">${escapeHtml(item.narrativeType)}</span>
                        <span>${escapeHtml(item.providerName)}</span>
                    </div>
                    <h5>${escapeHtml(item.title)}</h5>
                    <p>${escapeHtml(item.description)}</p>
                    <div class="catalog-tag-row">
                        ${(item.tags || []).slice(0, 4).map(tag => `<span class="mini-chip">${escapeHtml(tag)}</span>`).join('')}
                    </div>
                    <div class="narrative-actions">${action}</div>
                </article>
            `;
        }

        document.getElementById('narrativeList').addEventListener('click', (event) => {
            const audioButton = event.target.closest('[data-catalog-audio]');
            const readButton = event.target.closest('[data-read-highlight]');
            if (!audioButton && !readButton) return;

            if (readButton) {
                const card = readButton.closest('.narrative-asset-card');
                card?.classList.toggle('is-reading');
                readButton.textContent = card?.classList.contains('is-reading') ? 'Narasi Disorot' : 'Baca Narasi';
                return;
            }

            const status = audioButton.parentElement.querySelector('.catalog-audio-status');
            const mediaPath = audioButton.dataset.catalogAudio;

            if (!mediaPath) {
                audioButton.textContent = 'Audio Placeholder Aktif';
                if (status) status.textContent = 'Slot audio ini siap menerima file dari kolom media_path.';
                return;
            }

            const audio = new Audio(mediaPath);
            audio.play()
                .then(() => {
                    audioButton.textContent = 'Playing';
                    if (status) status.textContent = 'Audio sedang diputar.';
                })
                .catch(() => {
                    audioButton.textContent = 'Dengarkan Audio';
                    if (status) status.textContent = 'File audio belum dapat diputar. Periksa media_path atau format file.';
                });
        });

        document.getElementById('closeCatalog').onclick = () => {
            document.getElementById('catalogModal').style.display = 'none';
        };
    </script>
</body>
</html>
